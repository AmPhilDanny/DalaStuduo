services:
  # ── Express API server ──
  - type: web
    name: skillbridge-api
    runtime: node
    rootDir: server
    buildCommand: NODE_OPTIONS="--max-old-space-size=4096" npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4001"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
