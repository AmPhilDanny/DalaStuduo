services:
  # ── Unified web service (API + SPA frontend) ──
  - type: web
    name: skillbridge-api
    runtime: node
    rootDir: .
    buildCommand: cd Skillbridge && npm install --no-optional && npm run build && cd ../server && npm install && npm run build
    startCommand: cd server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4001"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      # Frontend build-time env vars
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        value: https://dalastudioshowcase.onrender.com/api

  # ── Admin dashboard ──
  - type: web
    name: skillbridge-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        value: https://dalastudioshowcase.onrender.com/api
      - key: VITE_MAIN_SITE_URL
        value: https://dalastudioshowcase.onrender.com
