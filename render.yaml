services:
  # ── Express API server ──
  - type: web
    name: skillbridge-api
    runtime: node
    rootDir: server
    buildCommand: MEDIASOUP_SKIP_WORKER_PREBUILT_DOWNLOAD=false npm_config_build_from_source=false npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4001"
      - key: MEDIASOUP_SKIP_WORKER_PREBUILT_DOWNLOAD
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
